services:
  - type: web
    name: auralytix-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_COOKIES_CONTENT
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_ORIGIN
        sync: false
      - key: LANGSMITH_TRACING
        value: "false"
